<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sandbox Runtime</title>
    <style>
      /* Base sandbox styling for absolute isolation */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #ffffff;
        color: #1a1a1a;
      }
      body {
        /* No forced padding — each question controls its own spacing */
        overflow-x: hidden;
      }
      #root {
        width: 100%;
        height: 100%;
        min-height: 100vh;
        isolation: isolate; /* Create new stacking context */
      }
      /* Reset basic elements to prevent styles from bleeding out of their expected boxes */
      h1, h2, h3, h4, h5, h6, p, ul, ol, li, figure {
        margin: 0;
        padding: 0;
      }
      button {
        font-family: inherit;
      }
      *, *::before, *::after {
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <!-- React Component Root -->
    <div id="root"></div>
    
    <!-- Portal Root (For Modals, Tooltips, etc) -->
    <div id="portal-root"></div>

    <script type="module" src="/src/sandbox-entry.jsx"></script>
  </body>
</html>
